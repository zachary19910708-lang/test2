<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>军事模拟数据生成系统</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent-color);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        h2 { margin: 0; font-weight: 500; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: white;
            transition: background 0.2s;
        }
        .btn-primary { background-color: var(--accent-color); }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-outline { background-color: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); }
        .btn-outline:hover { background-color: var(--accent-color); color: white; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; margin-right: 5px; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--panel-bg);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background-color: rgba(0,0,0,0.2); color: var(--text-secondary); font-weight: normal; }
        tr:hover { background-color: rgba(255,255,255,0.02); }

        /* Forms */
        .form-container { background-color: var(--panel-bg); padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .form-control {
            width: 100%;
            padding: 10px;
            background-color: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }
        select.form-control { appearance: auto; }
        
        /* Dynamic Config Panel */
        .dynamic-config {
            background-color: rgba(0,0,0,0.1);
            padding: 15px;
            border-radius: 4px;
            border: 1px dashed var(--border-color);
            margin-top: 10px;
            display: none;
        }

        /* Preview Grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .preview-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .preview-data-rep {
            width: 100%;
            height: 180px;
            background-color: #334155;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .image-placeholder { background: linear-gradient(45deg, #2a4a7f, #1e293b); }
        .video-placeholder { background: linear-gradient(45deg, #5c412a, #1e293b); }
        .text-placeholder { background: linear-gradient(45deg, #3d3d3d, #1e293b); align-items: flex-start; text-align: left; font-family: monospace; padding: 15px;}
        .audio-placeholder { background: linear-gradient(45deg, #305c45, #1e293b); }

        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            background-color: var(--accent-color);
            margin-right: 5px;
            margin-bottom: 5px;
            display: inline-block;
        }
        .badge-success { background-color: var(--success-color); }
        .badge-warning { background-color: var(--warning-color); }

        /* Utility */
        .hidden { display: none; }
        .actions { display: flex; gap: 10px; }
        .data-detail-item {
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .data-detail-label {
            color: var(--text-secondary);
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">军事模拟数据平台</div>
        <div class="nav-item active" onclick="switchView('list-view')">数据集管理</div>
        <div class="nav-item" onclick="switchView('create-view')">新建数据集</div>
    </div>

    <div class="main-content">
        
        <div id="list-view">
            <div class="header">
                <h2>数据集管理列表</h2>
                <div class="actions">
                    <button class="btn btn-outline">导入数据集</button>
                    <button class="btn btn-primary" onclick="switchView('create-view')">+ 新建数据集</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>数据集名称</th>
                        <th>数据类型</th>
                        <th>生成规模</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataset-tbody">
                    </tbody>
            </table>
        </div>

        <div id="create-view" class="hidden">
            <div class="header">
                <h2>新建/编辑 模拟数据集</h2>
                <button class="btn btn-outline" onclick="switchView('list-view')">返回列表</button>
            </div>
            <div class="form-container">
                <form id="create-form" onsubmit="handleCreate(event)">
                    <div class="form-group">
                        <label>数据集名称</label>
                        <input type="text" class="form-control" id="dataset-name" placeholder="例如：红蓝对抗红外影像数据集_v1" required>
                    </div>
                    
                    <div class="form-group">
                        <label>数据类型</label>
                        <select class="form-control" id="data-type" onchange="toggleDynamicConfig()" required>
                            <option value="">请选择类型...</option>
                            <option value="image">图像数据 (可见光/红外/SAR)</option>
                            <option value="video">视频数据 (无人机巡航/监控录像)</option>
                            <option value="text">文本数据 (情报电文/指挥指令)</option>
                            <option value="audio">音频数据 (声纹/战场噪音/通信截获)</option>
                        </select>
                    </div>

                    <div id="config-image" class="dynamic-config">
                        <h4 style="margin-top:0; color:var(--text-secondary);">图像详细参数</h4>
                        <div class="form-group"><label>传感器类型</label><select class="form-control" id="image-sensor"><option>可见光 CCD</option><option>长波红外 (LWIR)</option><option>合成孔径雷达 (SAR)</option></select></div>
                        <div class="form-group"><label>分辨率</label><select class="form-control" id="image-res"><option>1920x1080</option><option>4K</option><option>512x512 (模型训练专用)</option></select></div>
                    </div>

                    <div id="config-video" class="dynamic-config">
                        <h4 style="margin-top:0; color:var(--text-secondary);">视频详细参数</h4>
                        <div class="form-group"><label>帧率 (FPS)</label><input type="number" class="form-control" id="video-fps" value="30"></div>
                        <div class="form-group"><label>时长限制 (秒/段)</label><input type="number" class="form-control" id="video-duration" value="60"></div>
                    </div>

                    <div id="config-text" class="dynamic-config">
                        <h4 style="margin-top:0; color:var(--text-secondary);">文本详细参数</h4>
                        <div class="form-group"><label>报文格式</label><select class="form-control" id="text-format"><option>北约标准格式</option><option>自定义战术指令</option><option>非结构化开源情报</option></select></div>
                        <div class="form-group"><label>语言</label><input type="text" class="form-control" id="text-lang" value="中文, 英文"></div>
                    </div>

                    <div id="config-audio" class="dynamic-config">
                        <h4 style="margin-top:0; color:var(--text-secondary);">音频详细参数</h4>
                        <div class="form-group"><label>采样率</label><select class="form-control" id="audio-rate"><option>16kHz</option><option>44.1kHz</option></select></div>
                        <div class="form-group"><label>信噪比 (SNR) 注入范围</label><input type="text" class="form-control" id="audio-snr" placeholder="例如: -5dB ~ 15dB"></div>
                    </div>
                    <div class="form-group" style="margin-top: 20px;">
                        <label>生成规模 (样本数量)</label>
                        <input type="number" class="form-control" id="data-scale" placeholder="例如：10000" required>
                    </div>

                    <div class="form-group">
                        <label>目标特征配置 (以逗号分隔)</label>
                        <input type="text" class="form-control" id="target-features" placeholder="例如：T-90主战坦克, 轮式装甲车, 迷彩伪装">
                    </div>

                    <div class="form-group">
                        <label>环境与气象约束</label>
                        <select class="form-control" id="env-constraints" multiple style="height: 100px;">
                            <option value="晴天" selected>晴天 (高可见度)</option>
                            <option value="雨天">雨天 (中度遮挡)</option>
                            <option value="大雾">大雾 (严重遮挡)</option>
                            <option value="夜间">夜间 (微光环境)</option>
                            <option value="沙漠">沙漠地形背景</option>
                            <option value="城市">城市废墟背景</option>
                            <option value="丛林">丛林植被背景</option>
                        </select>
                        <small style="color:var(--text-secondary);">按住 Ctrl 或 Cmd 键进行多选</small>
                    </div>

                    <div class="actions" style="margin-top: 30px;">
                        <button type="submit" class="btn btn-primary">开始生成模拟数据</button>
                        <button type="button" class="btn btn-outline" onclick="document.getElementById('create-form').reset(); toggleDynamicConfig();">重置</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="preview-view" class="hidden">
            <div class="header">
                <div>
                    <h2 id="preview-title">数据集预览</h2>
                    <div style="margin-top: 8px; color: var(--text-secondary); font-size: 0.9rem;" id="preview-meta">
                        </div>
                </div>
                <button class="btn btn-outline" onclick="switchView('list-view')">返回列表</button>
            </div>
            
            <div class="preview-grid" id="preview-container">
                </div>
        </div>

    </div>

    <script>
        // Mock Database with rich preview data examples
        let datasets = [
            { id: 1, name: "近海舰艇合成孔径雷达(SAR)数据集", type: "图像数据", scale: 5000, status: "生成完成", date: "2023-10-24", 
              config: { sensor: "SAR (X波段)", res: "0.5m 分辨率", targets: ["驱逐舰", "护卫舰", "民用货轮"], envs: ["平静海面", "中等海况"] },
              previews: [
                { type: 'image', id: 'SAR_001', sensor: 'SAR', targets: '驱逐舰', confidence: 0.95, params: 'X-Band, 0.5m, Single Look, HH' },
                { type: 'image', id: 'SAR_002', sensor: 'SAR', targets: '护卫舰', confidence: 0.92, params: 'X-Band, 0.5m, Single Look, VV' },
                { type: 'image', id: 'SAR_003', sensor: 'SAR', targets: '多目标 (货轮+护卫舰)', confidence: 0.88, params: 'X-Band, 1.0m, Multi Look, HH' },
                { type: 'image', id: 'SAR_004', sensor: 'SAR', targets: '民用货轮', confidence: 0.97, params: 'X-Band, 0.5m, Single Look, VV' },
                { type: 'image', id: 'SAR_005', sensor: 'SAR', targets: '驱逐舰', confidence: 0.94, params: 'X-Band, 0.5m, Multi Look, HV' },
                { type: 'image', id: 'SAR_006', sensor: 'SAR', targets: '未知目标 (疑似小艇)', confidence: 0.75, params: 'X-Band, 0.5m, Single Look, HH' },
                { type: 'image', id: 'SAR_007', sensor: 'SAR', targets: '护卫舰 (港口背景)', confidence: 0.85, params: 'X-Band, 0.5m, Single Look, VV' },
                { type: 'image', id: 'SAR_008', sensor: 'SAR', targets: '驱逐舰', confidence: 0.96, params: 'X-Band, 0.5m, Single Look, HH' }
              ]
            },
            { id: 2, name: "城市巷战无人机视角视频集", type: "视频数据", scale: 200, status: "正在生成 (45%)", date: "2023-10-25",
              config: { sensor: "可见光 (4K)", fps: 30, targets: ["步兵小队", "装甲车", "掩体"], envs: ["城市废墟", "日间晴天"] },
              previews: [
                { type: 'video', id: 'VID_001', sensor: 'UAV Visible', targets: '步兵小队移动', duration: '15s', confidence: 0.91, params: '4K, 30fps, Hovering' },
                { type: 'video', id: 'VID_002', sensor: 'UAV Visible', targets: '装甲车巡逻', duration: '20s', confidence: 0.89, params: '4K, 30fps, Panning' },
                { type: 'video', id: 'VID_003', sensor: 'UAV Visible', targets: '疑似掩体识别', duration: '10s', confidence: 0.78, params: '4K, 30fps, Tracking' },
                { type: 'video', id: 'VID_004', sensor: 'UAV Visible', targets: '步兵掩体射击', duration: '25s', confidence: 0.93, params: '4K, 30fps, Fixed View' }
              ]
            },
            { id: 3, name: "多语种无线电通信截获文本", type: "文本数据", scale: 50000, status: "生成完成", date: "2023-10-25",
              config: { format: "北约标准报文", lang: "英文, 俄文, 阿拉伯文", targets: ["指挥指令", "位置报告"], envs: ["模拟战场噪声"] },
              previews: [
                { type: 'text', id: 'TXT_001', format: 'NATO Message', targets: '指挥指令', content: 'ORIG: CMD_RED | DEST: UNIT_A | MSG: ADVANCE TO POINT ALPHA. CONFIRM. | [TIMESTAMP: 20231025-1030Z]' },
                { type: 'text', id: 'TXT_002', format: 'Tactical Info', targets: '位置报告', content: 'UNIT_B STATUS: CURRENT POS [45.123N, 34.567E]. NO ENEMY CONTACT. | [TIMESTAMP: 20231025-1032Z]' },
                { type: 'text', id: 'TXT_003', format: 'NATO Message', targets: '火力请求', content: 'REQUEST FIRE SUPPORT AT GRID [45.111N, 34.588E]. TARGET: ARMORED COLUMN. | [TIMESTAMP: 20231025-1035Z]' },
                { type: 'text', id: 'TXT_004', format: 'Unstructured Intel', targets: '声称民用信息', content: '[模拟俄语] Наблюдаю движение колонны техники в секторе Г-4. Требуется подтверждение. (翻译: 观察到G-4区域有车队移动。需要确认。)' },
                { type: 'text', id: 'TXT_005', format: 'Tactical Info', targets: '后勤状态', content: 'UNIT_C AMMO STATUS: 60%. FUEL STATUS: 75%. | [TIMESTAMP: 20231025-1040Z]' },
                { type: 'text', id: 'TXT_006', format: 'NATO Message', targets: '撤退指令', content: 'ORIG: CMD_RED | DEST: UNIT_A | MSG: FALL BACK TO POINT BRAVO. REGROUP. | [TIMESTAMP: 20231025-1042Z]' }
              ]
            }
        ];

        // Init App
        function renderTable() {
            const tbody = document.getElementById('dataset-tbody');
            tbody.innerHTML = '';
            datasets.forEach(item => {
                let statusColor = item.status.includes("完成") ? "var(--success-color)" : "var(--accent-color)";
                tbody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td><span class="badge">${item.type}</span></td>
                        <td>${item.scale} 样本</td>
                        <td style="color: ${statusColor}">${item.status}</td>
                        <td>${item.date}</td>
                        <td>
                            <button class="btn btn-outline btn-sm" onclick="showPreview(${item.id})">预览详情</button>
                            <button class="btn btn-outline btn-sm">编辑配置</button>
                        </td>
                    </tr>
                `;
            });
        }

        // View Router
        function switchView(viewId) {
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('create-view').classList.add('hidden');
            document.getElementById('preview-view').classList.add('hidden');
            
            document.getElementById(viewId).classList.remove('hidden');
            
            // Update sidebar active state
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            if(viewId === 'list-view') navItems[0].classList.add('active');
            if(viewId === 'create-view') navItems[1].classList.add('active');

            if(viewId === 'list-view') renderTable();
        }

        // Handle Dynamic Form
        function toggleDynamicConfig() {
            const type = document.getElementById('data-type').value;
            const configs = ['image', 'video', 'text', 'audio'];
            
            configs.forEach(c => {
                document.getElementById(`config-${c}`).style.display = (c === type) ? 'block' : 'none';
            });
        }

        // Handle Form Submit
        function handleCreate(e) {
            e.preventDefault();
            const name = document.getElementById('dataset-name').value;
            const typeSelect = document.getElementById('data-type');
            const typeValue = typeSelect.value;
            const typeText = typeSelect.options[typeSelect.selectedIndex].text;
            const scale = document.getElementById('data-scale').value;
            
            const today = new Date().toISOString().split('T')[0];
            
            datasets.unshift({
                id: Date.now(),
                name: name,
                type: typeText.split(' ')[0], // Get main type text
                scale: scale,
                status: "正在生成 (0%)",
                date: today,
                config: { /* Specific parameters from form could be added here */ },
                previews: generateMockPreviews(typeValue, scale > 8 ? 8 : scale) // Generate a few mock previews based on type
            });
            
            alert("任务已提交！正在后台分配算力进行生成...");
            switchView('list-view');
            document.getElementById('create-form').reset();
            toggleDynamicConfig();
        }

        // Generate dynamic mock previews based on type
        function generateMockPreviews(type, count) {
            const previews = [];
            for (let i = 1; i <= count; i++) {
                const id = `${type.toUpperCase()}_SIM_${Math.floor(Math.random()*10000)}`;
                const confidence = (Math.random() * (0.99 - 0.75) + 0.75).toFixed(2);
                let previewItem = { type, id, confidence };

                if (type === 'image') {
                    previewItem = { ...previewItem, sensor: 'IR (模拟)', targets: 'T-72坦克 (热源)', params: 'LWIR, 640x512, Simulated Noise' };
                } else if (type === 'video') {
                    previewItem = { ...previewItem, sensor: 'UAV IR (模拟)', targets: '装甲车移动', duration: '12s', params: 'HD, 30fps, Simulated Grain' };
                } else if (type === 'text') {
                    previewItem = { ...previewItem, format: 'Custom Tactical', targets: '位置报告', content: `UNIT_${String.fromCharCode(65 + Math.floor(Math.random()*26))} STATUS: CURRENT POS [${(Math.random()*90).toFixed(3)}N, ${(Math.random()*180).toFixed(3)}E]. NO CONTACT.` };
                } else if (type === 'audio') {
                    previewItem = { ...previewItem, format: 'Comms Intercept', targets: '语音通信 (模拟)', duration: '8s', params: '16kHz, -3dB SNR, Simulated Jamming' };
                }
                previews.push(previewItem);
            }
            return previews;
        }

        // Handle Preview with genuine-looking simulated data
        function showPreview(datasetId) {
            const dataset = datasets.find(d => d.id === datasetId);
            if (!dataset) return;

            document.getElementById('preview-title').innerText = `${dataset.name} - 预览详情`;
            
            // Build meta string from config
            let metaString = `数据类型: ${dataset.type} | 环境约束: ${dataset.config.envs ? dataset.config.envs.join(', ') : '混合气象'} | 目标特征: ${dataset.config.targets ? dataset.config.targets.join(', ') : '自动匹配'}`;
            if (dataset.config.sensor) metaString += ` | 传感器: ${dataset.config.sensor}`;
            if (dataset.config.res) metaString += ` | 分辨率: ${dataset.config.res}`;
            if (dataset.config.fps) metaString += ` | 帧率: ${dataset.config.fps}fps`;
            if (dataset.config.format) metaString += ` | 格式: ${dataset.config.format}`;
            if (dataset.config.lang) metaString += ` | 语言: ${dataset.config.lang}`;
            if (dataset.config.rate) metaString += ` | 采样率: ${dataset.config.rate}`;
            if (dataset.config.snr) metaString += ` | SNR: ${dataset.config.snr}`;

            document.getElementById('preview-meta').innerText = metaString;
            
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            
            const previews = dataset.previews || [];
            if (previews.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">暂无预览数据 (可能正在生成中)</div>';
                switchView('preview-view');
                return;
            }

            previews.forEach(preview => {
                let dataRepHtml = '';
                let typeText = '';

                if (preview.type === 'image') {
                    typeText = '图像数据';
                    dataRepHtml = `
                        <div class="preview-data-rep image-placeholder">
                            <div class="data-detail-item"><span class="data-detail-label">传感器:</span> ${preview.sensor}</div>
                            <div class="data-detail-item"><span class="data-detail-label">目标:</span> ${preview.targets}</div>
                            <div class="data-detail-item"><span class="data-detail-label">关键参数:</span> ${preview.params}</div>
                            <div style="margin-top: 15px; font-style: italic; opacity: 0.7;">[模拟图像渲染区域]</div>
                        </div>`;
                } else if (preview.type === 'video') {
                    typeText = '视频片段';
                    dataRepHtml = `
                        <div class="preview-data-rep video-placeholder">
                            <div class="data-detail-item"><span class="data-detail-label">传感器:</span> ${preview.sensor}</div>
                            <div class="data-detail-item"><span class="data-detail-label">目标:</span> ${preview.targets}</div>
                            <div class="data-detail-item"><span class="data-detail-label">时长:</span> ${preview.duration}</div>
                            <div class="data-detail-item"><span class="data-detail-label">关键参数:</span> ${preview.params}</div>
                            <div style="margin-top: 15px; font-style: italic; opacity: 0.7;">[模拟视频片段区域]</div>
                        </div>`;
                } else if (preview.type === 'text') {
                    typeText = '截获报文';
                    const truncatedContent = preview.content.length > 150 ? preview.content.substring(0, 147) + '...' : preview.content;
                    dataRepHtml = `
                        <div class="preview-data-rep text-placeholder">
                            <div style="margin-bottom: 8px;">报文格式: ${preview.format}</div>
                            <div style="color: var(--text-primary);">${truncatedContent}</div>
                        </div>`;
                } else if (preview.type === 'audio') {
                    typeText = '声纹/噪声';
                    dataRepHtml = `
                        <div class="preview-data-rep audio-placeholder">
                            <div class="data-detail-item"><span class="data-detail-label">格式:</span> ${preview.format}</div>
                            <div class="data-detail-item"><span class="data-detail-label">目标:</span> ${preview.targets}</div>
                            <div class="data-detail-item"><span class="data-detail-label">时长:</span> ${preview.duration}</div>
                            <div class="data-detail-item"><span class="data-detail-label">关键参数:</span> ${preview.params}</div>
                            <div style="margin-top: 15px; font-style: italic; opacity: 0.7;">[模拟音频波形区域]</div>
                        </div>`;
                }

                container.innerHTML += `
                    <div class="preview-card">
                        ${dataRepHtml}
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                            <span class="badge" style="margin-bottom:0;">${typeText}</span>
                            <span style="font-size: 0.9rem;">编号: ${preview.id}</span>
                        </div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center;">
                            目标置信度: 
                            <span class="badge ${preview.confidence > 0.9 ? 'badge-success' : (preview.confidence > 0.8 ? '' : 'badge-warning')}" style="margin-left: 5px; margin-bottom: 0; padding: 1px 5px;">${preview.confidence}</span>
                        </div>
                    </div>
                `;
            });

            switchView('preview-view');
        }

        // Initial Render
        renderTable();
    </script>
</body>
</html>
